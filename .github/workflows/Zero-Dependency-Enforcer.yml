name: Zero-Dependency-Enforcer

on:
  push:
  pull_request:

jobs:
  zero-dependency-enforcer:
    name: "zero-dependency-enforcer"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Interrogate go.mod
        run: |
          if grep -iq "require" go.mod; then
            echo "::error::[INTEGRITY VIOLATION] The keyword 'require' was found in go.mod."
            echo "::error::This core engine strictly prohibits third-party dependencies to maintain zero-overhead performance."
            echo "::error::Validation failed."
            exit 1 
          else
            echo "[SUCCESS] Architecture integrity verified. No external dependencies found."
          fi